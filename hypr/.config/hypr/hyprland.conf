# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# Use defaults Omarchy defaults (but don't edit these directly!)
source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

# Change your own setup in these files (and overwrite any settings from defaults!)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/autostart.conf

# Create workspaces 1–10 as "default"
workspace=1,monitor:eDP-1
workspace=2,monitor:eDP-1
workspace=3,monitor:eDP-1
workspace=4,monitor:eDP-1
workspace=5,monitor:eDP-1
workspace=6,monitor:eDP-1
workspace=7,monitor:eDP-1
workspace=8,monitor:eDP-1
workspace=9,monitor:eDP-1
workspace=10,monitor:eDP-1
workspace=11,monitor:eDP-1
workspace=12,monitor:HDMI-A-1
# ----------------------------------------------------- 
# General Styling
# ----------------------------------------------------- 
decoration {
    rounding = 8
}

general {
    col.active_border = rgba(6b8e23ff)
}

# ----------------------------------------------------- 
# Window Rules
# ----------------------------------------------------- 

# 1. Kitty Block (Named Rule)
# This uses the new block syntax you wanted.
windowrule {
  name = move-kitty
  match:class = kitty

  # Move to specific coordinates and set animation
  move = 100 100
  animation = popin
  
  # Opacity: active 1.0, inactive 0.5, fullscreen 0.8
  opacity = 1.0 override 0.5 override 0.8 override
  
  # Rounding specific to kitty
  rounding = 10
}

# 2. Dynamic Kitty Centering (Anonymous Rule)
# This overrides the static move above because it is strictly defined later/separately.
# It uses the math expressions now supported in v0.47+.
windowrule = move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5)), match:class kitty

# 3. Firefox No Blur
windowrule = no_blur on, match:class firefox

# 4. Red Border if Fullscreen
windowrule = border_color rgb(FF0000) rgb(880808), match:fullscreen 1

# 5. Yellow Border if Title contains Hyprland
windowrule = border_color rgb(FFFF00), match:title .*Hyprland.*

# 6. Pinentry Stay Focused
windowrule = stay_focused on, match:class (pinentry-)(.*)


# ----------------------------------------------------- 
# Chromium/Vivaldi Rules
# ----------------------------------------------------- 

# Normal Opacity
windowrule = opacity 0.9, match:class ^(vivaldi-stable)$
windowrule = opacity 0.9, match:class ^(vivaldi-youtube.com__-Default)$

# Force Opaque when Fullscreen
windowrule = opacity 1.0, match:class ^(vivaldi-stable)$, match:fullscreen 1
windowrule = opacity 1.0, match:class ^(vivaldi-youtube.com__-Default)$, match:fullscreen 1


# ----------------------------------------------------- 
# Workspace Assignments
# ----------------------------------------------------- 
# Note: Using regex anchors ^ $ is still good practice for class matching

windowrule = workspace 1, match:class ^(eww)$
windowrule = workspace 2, match:class ^(kitty)$
windowrule = workspace 3, match:class ^(vivaldi-stable)$
windowrule = workspace 4, match:class obsidian
windowrule = workspace 5, match:class ^(code)$
windowrule = workspace 6, match:class ^(vivaldi-gemini.google.com__app-Default)$
windowrule = workspace 7, match:class ^(thunderbird)$
windowrule = workspace 8, match:class ^(vivaldi-web.whatsapp.com__-Default)$
windowrule = workspace 9, match:class ^(vivaldi-youtube.com__-Default)$
windowrule = workspace 10, match:class ^(org.gnome.Nautilus)$
windowrule = workspace 11, match:class ^(discord)$

# Float Network Manager
windowrule = float on, match:title ^(.*Network Manager.*)$
